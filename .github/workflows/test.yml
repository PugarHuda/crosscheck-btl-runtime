name: tests
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # pure stdlib — no install step. Live gateway tests skip without BTL_API_KEY.
      - name: self-checks
        run: |
          python crosscheck.py demo
          python server.py test
      - name: unit + integration suite
        run: python test_crosscheck.py
