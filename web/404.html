<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>404 — Crosscheck</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%231f5fff'%3E%3Crect x='2' y='2' width='6' height='6'/%3E%3Crect x='16' y='2' width='6' height='6'/%3E%3Crect x='9' y='9' width='6' height='6'/%3E%3Crect x='2' y='16' width='6' height='6'/%3E%3Crect x='16' y='16' width='6' height='6'/%3E%3C/svg%3E">
<style>
  :root{--ink:#0a0f1e;--paper:#fff;--text:#0f1622;--muted:#5c6675;--line:#e2e6ee;--accent:#1f5fff;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;--serif:Georgia,serif;
    --sans:system-ui,-apple-system,"Segoe UI",sans-serif}
  *{box-sizing:border-box;margin:0}
  body{background:var(--ink);color:var(--text);font-family:var(--sans);min-height:100vh;
    display:flex;align-items:center;justify-content:center;padding:14px}
  .card{background:var(--paper);border:1px solid var(--ink);border-radius:4px;
    padding:clamp(30px,6vw,64px);max-width:520px;text-align:center}
  .mark{width:30px;height:30px;color:var(--ink);margin:0 auto 20px;display:block}
  .code{font-family:var(--mono);font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
  h1{font-family:var(--mono);text-transform:uppercase;font-size:clamp(24px,5vw,38px);
    letter-spacing:-.01em;margin:12px 0 0;font-weight:600}
  h1 em{font-family:var(--serif);font-style:italic;text-transform:none;color:var(--accent)}
  p{color:var(--muted);margin:16px 0 26px;font-size:14.5px}
  a{display:inline-flex;gap:8px;font-family:var(--mono);font-size:12.5px;text-decoration:none;
    background:var(--ink);color:#fff;padding:12px 20px;border-radius:8px;margin:0 6px}
  a.ghost{background:#fff;color:var(--text);border:1px solid var(--ink)}
</style>
</head>
<body>
  <div class="card">
    <svg class="mark" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><rect x="2" y="2" width="6" height="6"/><rect x="16" y="2" width="6" height="6"/><rect x="9" y="9" width="6" height="6"/><rect x="2" y="16" width="6" height="6"/><rect x="16" y="16" width="6" height="6"/></svg>
    <div class="code">Error 404</div>
    <h1>This page <em>disagrees</em> with reality</h1>
    <p>The page you asked for isn't here. The models couldn't cross-check it either.</p>
    <a href="/">← Landing</a>
    <a class="ghost" href="/app">Open the app</a>
  </div>
</body>
</html>
